# Pre-commit hooks — fast checks at commit time (lint + dead-code +
# basic file hygiene + INV-1/INV-2 marker gates). The heavier suite
# (pyright strict + pytest) runs at the `pre-push` stage to keep
# commit-time latency low. All verification is local; there is no CI.
#
# Install both stages with:
#   uv run pre-commit install --hook-type pre-commit --hook-type pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^\.pre-commit-config\.yaml$
      - id: check-toml
      - id: check-added-large-files
        # Vocabulary-design fixture PDFs are intentionally multi-MB.
        args: [--maxkb=2048]
        exclude: ^tests/fixtures/vocabulary-design/.*\.pdf$
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
      - id: vulture
        args: [src, --min-confidence, "80"]

  - repo: local
    hooks:
      # Invariant gates — populated as Phase 1 implementation lands.
      # Each invariant in INVARIANTS.md has a corresponding pytest in
      # tests/invariants/ that runs as part of the full suite below.
      - id: invariant-marker-present
        name: amanuensis.yaml marker present (INV-1)
        entry: >-
          bash -c 'test -f amanuensis.yaml || (echo "INV-1 violation - amanuensis.yaml missing" && exit 1)'
        language: system
        pass_filenames: false
        always_run: true

      - id: no-harness-files
        name: no harness-specific files at root (INV-2)
        entry: >-
          bash -c 'for f in CLAUDE.md AGENTS.md GEMINI.md README.md; do
          if [ -f "$f" ]; then echo "INV-2 violation - $f at root (harness-specific)"; exit 1; fi;
          done'
        language: system
        pass_filenames: false
        always_run: true

      # ---- pre-push only — heavier checks, NOT run on every commit ----
      # macOS / CPython 3.12.13 workaround: 3.12.13 backported a
      # `site.py` change that skips `.pth` files carrying `UF_HIDDEN`,
      # and `pytest`'s own Python startup ends up marking the editable-
      # install `.pth` as hidden between invocations on macOS — so a
      # standalone "unhide" hook before pytest does not stick (something
      # between hooks re-hides it). The robust fix is to chflags
      # IMMEDIATELY before each Python invocation, inside the same
      # `bash -c`, so no other process can re-hide in the gap.
      # `2>/dev/null || true` keeps Linux runners (no `chflags`) happy.
      - id: pyright-strict
        name: pyright strict (src + tests)
        entry: >-
          bash -c 'find .venv -name "*.pth" -exec chflags nohidden {} + 2>/dev/null || true;
          uv run pyright src tests'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # Run the full pytest suite. Currently ~7s for ~250 tests; will
      # grow as M5+ wrapper tests + M6+ integration tests + M7 + M11
      # land. If this gets slow, split into a fast-mark and run the
      # slow tier on demand rather than weakening this hook.
      - id: pytest
        name: pytest (full suite)
        entry: >-
          bash -c 'find .venv -name "*.pth" -exec chflags nohidden {} + 2>/dev/null || true;
          uv run pytest -q'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
