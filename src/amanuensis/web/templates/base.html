<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}amanuensis{% endblock %}</title>
    <link rel="stylesheet" href="/static/tailwind.css" />
    <script src="/static/vendor/htmx.min.js" defer></script>
    {% block extra_head %}{% endblock %}
  </head>
  <body class="h-full bg-neutral-950 text-neutral-100 antialiased">
    <header class="border-b border-neutral-800 bg-neutral-900">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
        <a href="/" class="font-semibold tracking-tight text-neutral-50">amanuensis</a>
        <nav class="flex gap-4 text-sm text-neutral-400">
          <a href="/entities" class="hover:text-neutral-50">entities</a>
          {% block nav %}{% endblock %}
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-6">
      {% block content %}{% endblock %}
    </main>

    <footer class="mt-12 border-t border-neutral-800 py-4 text-center text-xs text-neutral-500">
      local supervisor console &middot; localhost only
    </footer>
  </body>
</html>
